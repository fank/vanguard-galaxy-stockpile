version: 2
updates:
  - package-ecosystem: "nuget"
    directory: "/VGStockpile"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    # Match the repo's conventional-commits style: "chore(deps): bump X from Y to Z".
    commit-message:
      prefix: "chore"
      include: "scope"
    groups:
      bepinex:
        patterns:
          - "BepInEx.*"
    ignore:
      # Pinned to the game's Unity runtime — bumping would desync stubs.
      - dependency-name: "UnityEngine.Modules"
      # BepInEx 6 is a separate major branch with a different plugin API.
      # Stay on the 5.x stable line until there's a deliberate migration.
      - dependency-name: "BepInEx.Core"
        update-types: ["version-update:semver-major"]
      # Pinned to 2.10.x: BepInEx 5 ships HarmonyX 2.10 at runtime; 2.16+
      # adds a MonoMod.Backports dependency that isn't on the load path,
      # causing FileNotFoundException at plugin startup. Unpin once
      # BepInEx 5 bumps its bundled HarmonyX or we commit to shipping
      # the MonoMod runtime DLLs alongside the plugin.
      - dependency-name: "HarmonyX"
      # Pinned to 13.0.2 to match the version the game ships at runtime.
      # Newer Newtonsoft.Json minors add convenience overloads that
      # Roslyn would bind us to, throwing MissingMethodException against
      # the runtime's older copy.
      - dependency-name: "Newtonsoft.Json"

  - package-ecosystem: "nuget"
    directory: "/VGStockpile.Tests"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore"
      include: "scope"
    groups:
      bepinex:
        patterns:
          - "BepInEx.*"
      xunit:
        patterns:
          - "xunit*"
    ignore:
      - dependency-name: "UnityEngine.Modules"
      - dependency-name: "BepInEx.Core"
        update-types: ["version-update:semver-major"]
      - dependency-name: "HarmonyX"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore"
      include: "scope"
    groups:
      actions:
        patterns:
          - "*"
