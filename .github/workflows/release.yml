name: Package release

# Triggers when a GitHub Release is published. Also runnable manually.
#
# The plugin references Assembly-CSharp.dll (the game's proprietary
# assembly) plus UnityEngine.UI.dll and Unity.TextMeshPro.dll (Unity
# runtime bits not covered by the UnityEngine.Modules NuGet). None can
# live on a public runner, so the repo commits PUBLICIZED stubs (method
# signatures only, no IL) at VGStockpile/lib/. CI compiles against the
# stubs; the real runtime assemblies take over in-game via Mono's late
# binding.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to (re)package"
        required: true
        type: string

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    env:
      TAG: ${{ github.event.release.tag_name || inputs.tag }}

    steps:
      - name: Checkout repo at release tag
        uses: actions/checkout@v6
        with:
          ref: ${{ env.TAG }}

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Verify publicized references are committed
        run: |
          missing=0
          for stub in Assembly-CSharp.dll UnityEngine.UI.dll Unity.TextMeshPro.dll; do
            path="VGStockpile/lib/$stub"
            if [ ! -s "$path" ]; then
              echo "::error::$path is missing or empty. Regenerate via 'assembly-publicizer --strip <game>/$stub -o $path' and commit. (--strip is required.)"
              missing=1
            else
              echo "Publicized reference present: $path ($(du -h "$path" | cut -f1))"
            fi
          done
          [ "$missing" = "0" ] || exit 1

      - name: Build VGStockpile.dll
        run: dotnet build VGStockpile/VGStockpile.csproj -c Debug --nologo

      - name: Stage release layout
        id: stage
        run: |
          VERSION=$(grep 'PluginVersion =' VGStockpile/Plugin.cs | head -1 | sed 's/.*"\(.*\)".*/\1/')
          PKG_NAME="VGStockpile-v${VERSION}"
          # Nested VGStockpile/ is intentional: it's the folder the user
          # drops into BepInEx/plugins/.
          PKG_DIR="dist/${PKG_NAME}/VGStockpile"

          rm -rf "dist/${PKG_NAME}"
          mkdir -p "$PKG_DIR"

          cp VGStockpile/bin/Debug/netstandard2.1/VGStockpile.dll "$PKG_DIR/"
          cp README.md "$PKG_DIR/"
          [ -f LICENSE ] && cp LICENSE "$PKG_DIR/" || true

          SIZE=$(du -sh "$PKG_DIR" | cut -f1)
          echo "Staged DLL + README — $SIZE at $PKG_DIR"

          echo "pkg_name=${PKG_NAME}" >> "$GITHUB_OUTPUT"

      - name: Zip release bundle
        run: |
          (cd "dist/${{ steps.stage.outputs.pkg_name }}" && \
             zip -qr "../${{ steps.stage.outputs.pkg_name }}.zip" VGStockpile)
          ls -lh "dist/${{ steps.stage.outputs.pkg_name }}.zip"

      - name: Upload zip to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "$TAG" "dist/${{ steps.stage.outputs.pkg_name }}.zip" --clobber
          echo "Uploaded ${{ steps.stage.outputs.pkg_name }}.zip to release $TAG"
